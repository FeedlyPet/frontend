name: Deploy Frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: rm -rf ${{ secrets.SERVER_DEPLOY_PATH }}/dist_new

      - uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: dist/
          target: ${{ secrets.SERVER_DEPLOY_PATH }}/dist_new
          strip_components: 1

      - name: Swap and reload
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            rm -rf ${{ secrets.SERVER_DEPLOY_PATH }}/dist_old
            mv ${{ secrets.SERVER_DEPLOY_PATH }}/dist ${{ secrets.SERVER_DEPLOY_PATH }}/dist_old || true
            mv ${{ secrets.SERVER_DEPLOY_PATH }}/dist_new ${{ secrets.SERVER_DEPLOY_PATH }}/dist
            nginx -s reload
